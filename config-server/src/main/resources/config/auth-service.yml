server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/auth_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: 4A614E645267556B58703273357638792F423F4528482B4D6251655468576D5A
  expiration: 900000        # Access token: 15 minutes
  refresh-expiration: 604800000  # Refresh token: 7 days

management:
